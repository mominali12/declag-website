<script>
function updateArc() {
  const svg = document.querySelector('.heading-arc svg');
  const path = document.getElementById('arcPath');
  const text = svg.querySelector('.arc-text textPath');
  const textLength = text.getComputedTextLength();

  const width = svg.viewBox.baseVal.width; // 1000
  const height = svg.viewBox.baseVal.height; // 300

  // Determine a radius based on text length and SVG width
  const padding = 50; // leave space on edges
  const effectiveWidth = width - padding * 2;
  const radius = Math.max(150, effectiveWidth / 2); // min radius = 150

  // Arc path using quadratic Bézier
  const startX = (width - effectiveWidth) / 2;
  const endX = width - startX;
  const controlY = height - radius; // peak of the arc
  const controlX = width / 2;

  const d = `M${startX} ${height - 50} Q${controlX} ${controlY} ${endX} ${height - 50}`;
  path.setAttribute('d', d);
}

// Update on load and on window resize
window.addEventListener('load', updateArc);
window.addEventListener('resize', updateArc);
</script>
